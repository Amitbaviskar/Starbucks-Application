apiVersion: apps/v1
kind: Deployment
metadata:
  name: starbucks-app
  namespace: starbucks
spec:
  replicas: 2
  selector:
    matchLabels:
      app: starbucks
  template:
    metadata:
      labels:
        app: starbucks
    spec:
      containers:
      - name: starbucks-app
        image: amitbaviskar/starbucks-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
